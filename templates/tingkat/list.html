{% extends 'base.html' %}

{% block title %}Daftar Tingkat{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="card-title">Daftar Tingkat</h4>
                    <a href="{% url 'tingkat_tambah' %}" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Tambah Tingkat
                    </a>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered">
                            <thead>
                                <tr>
                                    <th>No</th>
                                    <th>Nama Tingkat</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for item in tingkat %}
                                <tr>
                                    <td>{{ forloop.counter }}</td>
                                    <td>{{ item.nama_tingkat }}</td>
                                    <td>
                                        <a href="{% url 'tingkat_edit' item.id %}" class="btn btn-sm btn-warning" title="Edit">
                                            <i class="fas fa-edit"></i> Edit
                                        </a>
                                        <a href="{% url 'tingkat_hapus' item.id %}" class="btn btn-sm btn-danger" 
                                           onclick="return confirm('Apakah Anda yakin ingin menghapus tingkat ini?')" title="Hapus">
                                            <i class="fas fa-trash"></i> Hapus
                                        </a>
                                    </td>
                                </tr>
                                {% empty %}
                                <tr>
                                    <td colspan="3" class="text-center">Tidak ada data tingkat</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
